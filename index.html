<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nibir's Sadaqah Jaariyah</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #18212f;
      --muted: #5f6b7a;
      --line: #e2e8f0;
      --accent: #111827;
      --soft: #eef2f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #ffffff, #f1f5f9);
      color: var(--text);
    }
    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }
    header {
      background: rgba(255,255,255,0.9);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    .header-inner {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      padding: 20px 0;
      flex-wrap: wrap;
    }
    h1 { margin: 0 0 8px; font-size: 34px; }
    h2 { margin: 0 0 8px; }
    .lead { color: var(--muted); max-width: 760px; line-height: 1.7; }
    button, .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 16px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:hover, .btn:hover { transform: translateY(-1px); }
    .btn-dark { background: var(--accent); color: #fff; border-color: var(--accent); }
    .section { padding: 32px 0; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
    }
    .panel { padding: 24px; }
    .search-wrap {
      display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap;
    }
    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid #cfd8e3;
      font-size: 15px;
      outline: none;
    }
    .search-box { max-width: 380px; width: 100%; }
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }
    .article-card { padding: 24px; }
    .meta {
      display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap;
      font-size: 12px; color: var(--muted); margin-bottom: 16px;
    }
    .pill {
      display: inline-block; background: var(--soft); color: #334155; padding: 6px 12px; border-radius: 999px; font-size: 12px;
    }
    .excerpt { color: var(--muted); line-height: 1.7; min-height: 76px; }
    .reader { padding: 28px; }
    .reader h2 { font-size: 32px; }
    .reader-content { white-space: pre-wrap; line-height: 1.9; color: #334155; }
    .hidden { display: none !important; }
    .small { font-size: 13px; color: var(--muted); }
    footer {
      border-top: 1px solid var(--line);
      background: #fff;
      margin-top: 30px;
    }
    footer .container { padding: 18px 0; color: var(--muted); font-size: 14px; }
    @media (max-width: 900px) {
      h1 { font-size: 28px; }
      .reader h2 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-inner">
      <div>
        <h1>Nibir's Sadaqah Jaariyah</h1>
        <div class="lead">The collection of the writings of Asif Asmat Nibir, a meritorious student of BUET IPE'21.</div>
      </div>
    </div>
  </header>

  <main class="container section">
    <section id="viewerSection">
      <div class="card panel search-wrap">
        <div>
          <h2>Writings Collection</h2>
          <div class="small">Browse the articles and open any writing to read it fully.</div>
        </div>
        <div class="search-box">
          <input id="searchInput" type="text" placeholder="Search articles" />
        </div>
      </div>

      <div id="readerView" class="card reader hidden"></div>
      <div id="articlesGrid" class="articles-grid"></div>
    </section>
  </main>

  <footer>
    <div class="container">A digital archive created to preserve and share the writings of Asif Asmat Nibir.</div>
  </footer>

  <script>
    const starterArticles = [
      {
        id: '1',
        title: 'A Life of Thought and Kindness',
        category: 'Memoir',
        date: '2019-06-14',
        excerpt: 'A reflective piece on memory, humanity, and the quiet value of kindness in daily life.',
        content: 'This is a sample article. Replace this text with the original writing you want to publish.\\n\\nTo add a real writing, edit the starterArticles array in this file and then upload the updated index.html to GitHub again.',
        author: 'Asif Asmat Nibir'
      },
      {
        id: '2',
        title: 'Letters on Hope',
        category: 'Essay',
        date: '2020-02-03',
        excerpt: 'A thoughtful article about perseverance, inner strength, and faith in difficult times.',
        content: 'Hope does not always arrive with noise. Sometimes it appears quietly, in routine, in patience, in the decision to continue even when certainty is absent.',
        author: 'Asif Asmat Nibir'
      },
      {
        id: '3',
        title: 'On Simplicity',
        category: 'Article',
        date: '2018-11-21',
        excerpt: 'A short piece exploring simple living, peace of mind, and gratitude.',
        content: 'There is wisdom in simple words and simple habits. A meaningful life is not always the loudest one.',
        author: 'Asif Asmat Nibir'
      }
    ];

    let articles = starterArticles;
    let selectedArticleId = null;

    const articlesGrid = document.getElementById('articlesGrid');
    const readerView = document.getElementById('readerView');
    const searchInput = document.getElementById('searchInput');

    function formatDate(dateString) {
      try {
        return new Date(dateString).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
      } catch {
        return dateString;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderArticles() {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = articles.filter(a => [a.title, a.category, a.excerpt, a.content, a.author].join(' ').toLowerCase().includes(q));

      if (selectedArticleId) {
        const article = articles.find(a => a.id === selectedArticleId);
        if (article) {
          readerView.innerHTML = `
            <button onclick="backToList()">← Back to all articles</button>
            <div class="meta" style="margin-top:18px;">
              <span class="pill">${article.category}</span>
              <span>${formatDate(article.date)}</span>
            </div>
            <h2>${article.title}</h2>
            <div class="small" style="margin-bottom:22px;">By ${article.author}</div>
            <div class="reader-content">${escapeHtml(article.content).replace(/\n/g, '<br>')}</div>
          `;
          readerView.classList.remove('hidden');
          articlesGrid.classList.add('hidden');
          return;
        }
      }

      readerView.classList.add('hidden');
      articlesGrid.classList.remove('hidden');

      if (!filtered.length) {
        articlesGrid.innerHTML = `<div class="card panel" style="grid-column:1/-1; text-align:center;">No matching articles found.</div>`;
        return;
      }

      articlesGrid.innerHTML = filtered.map(article => `
        <div class="card article-card">
          <div class="meta">
            <span class="pill">${article.category}</span>
            <span>${formatDate(article.date)}</span>
          </div>
          <h3 style="margin:0 0 8px; font-size:24px;">${article.title}</h3>
          <div class="small" style="margin-bottom:14px;">By ${article.author}</div>
          <div class="excerpt">${escapeHtml(article.excerpt)}</div>
          <div style="margin-top:18px;">
            <button class="btn-dark" onclick="openArticle('${article.id}')">Read article</button>
          </div>
        </div>
      `).join('');
    }

    searchInput.addEventListener('input', renderArticles);

    window.openArticle = function(id) {
      selectedArticleId = id;
      renderArticles();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.backToList = function() {
      selectedArticleId = null;
      renderArticles();
    };

    renderArticles();
  </script>
</body>
</html>
